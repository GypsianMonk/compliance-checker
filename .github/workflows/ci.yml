name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  offline-smoke-test:
    name: Run compliance checker (offline mode, no API keys)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full pipeline (Regulation A + B)
        run: python app.py --regulation all

      - name: Verify structured output matches expected schema
        run: python scripts/verify_report.py

      - name: Upload report and traces as build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report-offline
          path: |
            output/report.json
            output/traces/
          retention-days: 14

  real-llm-test:
    name: Run compliance checker (real OpenAI LLM + LangSmith tracing)
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LANGSMITH_TRACING: ${{ secrets.LANGSMITH_TRACING }}
      LANGSMITH_ENDPOINT: ${{ secrets.LANGSMITH_ENDPOINT }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGSMITH_PROJECT: ${{ secrets.LANGSMITH_PROJECT }}
      # Opportunistic: try the real OpenAI/LangSmith path if the secrets
      # work, but don't block CI on it -- this job auto-degrades to the
      # offline fallback (see vectorstore/embeddings.py, agents/llm_client.py)
      # rather than failing, so a broken/unbilled OpenAI key never breaks
      # the pipeline. Set REQUIRE_REAL_LLM: "true" here instead if you
      # want this job to fail loudly when the real path doesn't work.

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (+ openai, langsmith)
        run: |
          pip install -r requirements.txt
          pip install openai langsmith

      - name: Run full pipeline (real LLM if it works, offline fallback otherwise)
        run: python app.py --regulation all

      - name: Verify structured output matches expected schema
        run: python scripts/verify_report.py

      - name: Upload report and traces as build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report-real-llm
          path: |
            output/report.json
            output/traces/
          retention-days: 14
